spring.application.name=geocoder

spring.datasource.url=jdbc:postgresql://localhost:5437/${POSTGRES_DB:geocoder}
spring.datasource.username=${POSTGRES_USER:geocoder}
spring.datasource.password=${POSTGRES_PASSWORD:geocoder}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false
spring.cache.type=redis
spring.cache.cache-names=geocoding

google.geocoding.api-key=${GOOGLE_API_KEY:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.endpoint.health.group.readiness.include=db

resilience4j.retry.instances.google.max-attempts=3
resilience4j.retry.instances.google.wait-duration=200ms
resilience4j.retry.instances.google.retry-exceptions=org.springframework.web.client.ResourceAccessException