<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="mapResult">

        <div th:if="${result != null}">
            <div style="background-color: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                <p style="margin: 0 0 10px 0;">
                    <strong>Data source:</strong>
                    <span th:text="${result.source()}"
                        th:style="${result.source() == 'database' ? 'color: blue;' : (result.source() == 'google' ? 'color: orange;' : 'color: green;')}">
                    </span>
                </p>
                <p style="margin: 0;">
                    <strong>Coordinates:</strong>
                    <span th:text="${result.latitude()}"></span>, <span th:text="${result.longitude()}"></span>
                </p>
            </div>

            <iframe width="100%" height="450" style="border:1px solid #ccc; border-radius: 5px;" loading="lazy"
                allowfullscreen
                th:src="@{'https://maps.google.com/maps?q=' + ${result.latitude()} + ',' + ${result.longitude()} + '&hl=en&z=14&output=embed'}">
            </iframe>
        </div>

        <div th:if="${result == null}">
            <p style="color: red; padding: 15px; background-color: #ffeeee; border-radius: 5px;">
                Address not found. Please refine your query.
            </p>
        </div>

    </div>
</body>

</html>
